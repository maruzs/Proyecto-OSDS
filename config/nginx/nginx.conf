events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Ocultar la versión de Nginx en los encabezados de respuesta
    server_tokens off;

    # Limitar el tamaño del cuerpo de la solicitud para prevenir denegación de servicio por carga masiva
    client_max_body_size 1m;

    # Configurar Rate Limiting: zona de almacenamiento de 10MB con un límite de 10 peticiones por segundo por IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

    # Habilitar soporte de WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name localhost;

        # Cabeceras de seguridad global obligatorias
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.socket.io;" always;

        # Frontend estático
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # WebSocket de Estaciones Médicas
        location /ws-medicas {
            # Aplicar Rate Limiting (zona ws_limit con ráfaga de 15 peticiones sin retardo inicial)
            limit_req zone=ws_limit burst=15 nodelay;

            proxy_pass http://app-estaciones:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustar timeouts de WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # WebSocket de Terminales Administrativas
        location /ws-administrativas {
            # Aplicar Rate Limiting (zona ws_limit con ráfaga de 15 peticiones sin retardo inicial)
            limit_req zone=ws_limit burst=15 nodelay;

            proxy_pass http://app-terminales:8002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustar timeouts de WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
