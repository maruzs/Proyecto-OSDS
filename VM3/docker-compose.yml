version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/frontend:/usr/share/nginx/html:ro
    networks:
      - hospital_net
      - cloud_net
      - dmz_net

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - dmz_net

networks:
  hospital_net:
    driver: bridge
    name: hospital_net
  cloud_net:
    driver: bridge
    name: cloud_net
  dmz_net:
    driver: bridge
    name: dmz_net
