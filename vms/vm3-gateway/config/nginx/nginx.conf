events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Ocultar la versión de Nginx en los encabezados de respuesta para evitar
    # que los atacantes identifiquen la versión exacta de Nginx para buscar CVEs específicos.
    server_tokens off;

    # Limitar el tamaño del cuerpo de la solicitud para prevenir denegación de servicio por carga masiva
    # Mitigacion de DDoS por carga util restringiendo el tamano del cuerpo en las peticiones HTTP a 1MB
    client_max_body_size 1m;

    # Configurar Rate Limiting: zona de almacenamiento de 10MB con un límite de 10 peticiones por segundo por IP
    # Esto previene ataques de denegación de servicio por inundación de handshakes de WebSockets.
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

    # Habilitar soporte de WebSocket 
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstream para Estaciones Medicas (VM1) - Balanceo con failover a la replica
    upstream ws_medicas {
        server 10.128.0.10:8001 max_fails=1 fail_timeout=5s;
        server 10.128.0.10:8011 backup;
    }

    # Upstream para Terminales Administrativas (VM2) - Balanceo con failover a la replica
    upstream ws_administrativas {
        server 10.128.0.20:8002 max_fails=1 fail_timeout=5s;
        server 10.128.0.20:8012 backup;
    }

    server {
        listen 80;
        server_name localhost;

        # Cabeceras de seguridad global obligatorias

        # X-Frame-Options: Previene ataques clickjacking (Insertar frontend en iframes de dominios no confiables)
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # X-Content-Type-Options: Previene ataques XSS por MIME Sniffing (forzando el tipo MIME)
        add_header X-Content-Type-Options "nosniff" always;
        
        # X-XSS-Protection: Activa el filtro XSS incorporado del navegador (obsoleto, pero útil)
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Content-Security-Policy: Politica de seguridad de contenido para prevenir inyecciones (XSS) 
        # Restriccion de Scripts, estilos y fuentes del navegador
        add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.socket.io;" always;

        # Frontend estático
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API de Bodega (Lectura de inventario para el frontend)
        location /api/inventario {
            proxy_pass http://app-bodega:8003/api/inventario;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        ## WebSockets con Rate Limiting para evitar DDoS
        # WebSocket de Estaciones Médicas
        location /ws-medicas {
            # Aplicar Rate Limiting (zona ws_limit con ráfaga de 15 peticiones sin retardo inicial)
            limit_req zone=ws_limit burst=15 nodelay;

            proxy_pass http://ws_medicas;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustar timeouts de WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # WebSocket de Terminales Administrativas
        location /ws-administrativas {
            # Aplicar Rate Limiting (zona ws_limit con ráfaga de 15 peticiones sin retardo inicial)
            limit_req zone=ws_limit burst=15 nodelay;

            proxy_pass http://ws_administrativas;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ajustar timeouts de WebSocket
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
